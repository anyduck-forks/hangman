name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build game
        run: npm run build

      - name: Build docs
        run: npm run docs:build

      - name: Build Storybook
        run: npm run storybook:build

      - name: Prepare Pages artifact
        run: |
          cp dist/index.html dist/404.html
          rm -rf dist-pages
          mkdir -p dist-pages
          cp -R dist/. dist-pages/
          mkdir -p dist-pages/docs
          cp -R docs/build/. dist-pages/docs/
          mkdir -p dist-pages/storybook
          cp -R storybook-static/. dist-pages/storybook/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
